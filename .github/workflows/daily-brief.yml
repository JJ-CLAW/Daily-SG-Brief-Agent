name: Daily Brief

on:
  schedule:
    - cron: '10 23 * * *'  # 23:10 UTC = 07:10 SGT (targets ~10:00 SGT after ~2h50m GitHub lag)
  workflow_dispatch:        # manual trigger from GitHub Actions tab

jobs:
  send:
    runs-on: ubuntu-latest
    environment: SG_BRIEF_AGENT
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send daily brief
        run: python -m brief_agent once
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
